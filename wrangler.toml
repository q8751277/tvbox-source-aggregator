name = "tvbox-source-aggregator"
main = "src/cf-entry.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
node_compat = true  # 必须开启，解决Node.js依赖兼容问题

# 你的自定义域名配置（已启用）
routes = [
  { pattern = "tvbox.87101.xyz/*", zone_id = "450540cc77094e1e81e4acf25f99ee4f" }
]

[triggers]
crons = ["0 * * * *"]  # 每小时触发

[[kv_namespaces]]
binding = "KV"
id = "450540cc77094e1e81e4acf25f99ee4f"
preview_id = "450540cc77094e1e81e4acf25f99ee4f"

[vars]
SPEED_TIMEOUT_MS = "5000"
SITE_TIMEOUT_MS = "3000"
FETCH_TIMEOUT_MS = "5000"
# 先填你的默认Worker域名，部署成功后再改成你的自定义域名
WORKER_BASE_URL = "https://tvbox-source-aggregator.你的用户名.workers.dev"
